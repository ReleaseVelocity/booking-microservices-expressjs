name: CI

on:
  pull_request:
    branches: [main, base-*]
  push:
    branches: [main]

# This repository is a polyrepo-style monorepo: there is no root package.json
# and no root lock file. Each microservice under src/<service> has its own
# package.json. CI must therefore install and run scripts per microservice.
#
# Notes:
# - We use `npm install` (not `npm ci`) because the microservices do not
#   commit lock files. If lock files are added later, switch back to `npm ci`.
# - `building-blocks` is a local file: dependency of the other services and
#   only defines lint/build scripts (no `test`), so it is included only in
#   the lint matrix.
# - No microservice defines a `test:e2e` script, so the integration-tests
#   job runs the existing `test` script with infrastructure services
#   (Postgres, RabbitMQ) available.

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [building-blocks, booking, flight, identity, passenger]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies (${{ matrix.service }})
        working-directory: src/${{ matrix.service }}
        run: npm install
      - name: Lint (${{ matrix.service }})
        working-directory: src/${{ matrix.service }}
        run: npm run lint

  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [booking, flight, identity, passenger]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies (${{ matrix.service }})
        working-directory: src/${{ matrix.service }}
        run: npm install
      - name: Unit tests (${{ matrix.service }})
        working-directory: src/${{ matrix.service }}
        run: npm test

  integration-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [booking, flight, identity, passenger]
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: booking_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      rabbitmq:
        image: rabbitmq:3-management
        ports:
          - 5672:5672
        options: >-
          --health-cmd "rabbitmqctl node_health_check"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies (${{ matrix.service }})
        working-directory: src/${{ matrix.service }}
        run: npm install
      - name: Integration tests (${{ matrix.service }})
        working-directory: src/${{ matrix.service }}
        run: npm test
        env:
          DATABASE_URL: postgresql://test:testpass@localhost:5432/booking_test
          RABBITMQ_URL: amqp://localhost:5672

  deploy-staging:
    needs: [lint, unit-tests, integration-tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Pull deployment artifact
        run: |
          echo "Pulling deployment artifact from registry..."
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.REGISTRY_TOKEN }}" \
            "https://registry.example.com/v2/booking-service/manifests/latest" 2>/dev/null || echo "000")
          if [ "$RESPONSE" != "200" ]; then
            echo "::error::Registry returned HTTP $RESPONSE"
            echo "ERROR: Authentication failed — registry token may be expired or missing"
            echo "Artifact URL: https://registry.example.com/v2/booking-service/manifests/latest"
            echo "Token source: GitHub Secret REGISTRY_TOKEN"
            echo "Last known rotation: 2026-04-15"
            exit 1
          fi
      - name: Deploy to ECS staging
        run: echo "Deploying booking-service to ECS staging..."
